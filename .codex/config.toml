# ========================================
# OpenAI Codex CLI 設定ファイル
# ========================================
# このファイルはリポジトリローカルのCodex設定です。
# グローバル設定は ~/.codex/config.toml に記載してください。
# ========================================

[default]
# 承認モード
#   "auto"       = ほぼ全操作を自動実行（高速だが破壊的操作の事前確認なし）
#   "manual"     = 全操作に人間の承認を求める（安全最優先）
#   "read-only"  = 読み取り専用（書き込み・実行は承認必須）
#
# スクール生・初心者は "manual" 推奨
# 熟練者で信頼するワークフローは "auto" 可
approval_mode = "manual"

# デフォルトモデル（必要に応じて変更）
# model = "gpt-5-codex"

# AGENTS.md の自動読込を有効化（Codex CLI デフォルトで有効）
# load_agents_md = true

# ========================================
# 禁止コマンド（追加したい場合）
# ========================================
# 重要: Codex CLIの仕様上、ここの設定名はCodexバージョンにより異なる場合があります。
# 最新の設定キーは codex --help または公式ドキュメントで確認してください。

# [commands.deny]
# patterns = [
#     "rm -rf /*",
#     "rm -rf ~*",
#     "sudo:*",
#     "git push --force:*",
#     "curl * | sh",
#     "curl * | bash",
# ]

# ========================================
